name: Daily Content Pipeline

on:
  schedule:
    - cron: '0 2 * * *'   # Writer: 2am UTC daily
    - cron: '0 5 * * *'   # Publisher: 5am UTC daily
  workflow_dispatch:
    inputs:
      run_writer:
        description: 'Run Agent 2 Writer'
        required: false
        default: 'false'
      run_publisher:
        description: 'Run Agent 3 Publisher'
        required: false
        default: 'false'

jobs:
  writer:
    name: 'Agent 2: Writer'
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 2 * * *'
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_writer == 'true')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r automations/content/requirements.txt
      - name: Run Writer
        env:
          SUPABASE_URL:        ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
        run: python automations/content/write_post.py

  publisher:
    name: 'Agent 3: Publisher'
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 5 * * *'
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_publisher == 'true')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r automations/content/requirements.txt
      - name: Run Publisher
        env:
          SUPABASE_URL:        ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          COMPOSIO_API_KEY:    ${{ secrets.COMPOSIO_API_KEY }}
        run: python automations/content/publish_post.py
